---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: librechat-frontend
  namespace: librechat
  labels:
    app: librechat-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: librechat-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: librechat-frontend
    spec:
      containers:
      - name: librechat-frontend
        image: ghcr.io/danny-avila/librechat:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3080
          name: http
        env:
        - name: VITE_APP_TITLE
          value: "LibreChat"
        - name: VITE_ENABLE_REGISTRATION
          value: "true"
        - name: VITE_ENABLE_LOGIN
          value: "true"
        - name: VITE_HIDE_DOWNLOADS
          value: "false"
        - name: VITE_ENDPOINTS_ENABLED
          value: "true"
        - name: VITE_TOOLS_ENABLED
          value: "true"
        - name: VITE_SHOW_PROJECTS
          value: "true"
        livenessProbe:
          httpGet:
            path: /
            port: 3080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 3080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: librechat-frontend
  namespace: librechat
  labels:
    app: librechat-frontend
spec:
  selector:
    app: librechat-frontend
  ports:
  - port: 3080
    targetPort: 3080
    name: http
  type: ClusterIP
