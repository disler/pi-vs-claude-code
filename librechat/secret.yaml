apiVersion: v1
kind: Secret
metadata:
  name: librechat-secrets
  namespace: librechat
type: Opaque
stringData:
  # MongoDB credentials
  MONGO_ROOT_PASSWORD: "librechat-root-password"
  MONGODB_PASSWORD: "librechat-db-password"
  # JWT secret for session management
  JWT_SECRET: "change-this-to-a-secure-random-string-in-production"
  # Registration key (optional, for admin registration)
  REGISTRATION_SECRET: "change-this-registry-secret"
  # OAuth secrets (configure as needed)
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""
  # API Keys for LLM providers (configure as needed)
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  GOOGLE_API_KEY: ""
